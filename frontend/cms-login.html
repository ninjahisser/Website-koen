<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Login - Het Voorlaatste Nieuws</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #e0e0e0;
        }
        
        .login-box h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 600;
            color: #222;
        }
        
        .login-box p {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 13px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 10px 35px 10px 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            background: white;
            transition: border-color 0.2s;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 32px;
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 14px;
            padding: 0 5px;
            line-height: 1;
        }

        .toggle-password:hover {
            color: #333;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #333;
        }
        
        .login-button {
            width: 100%;
            padding: 11px;
            background: #222;
            color: white;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .login-button:hover {
            background: #000;
        }
        
        .login-button:disabled {
            background: #999;
            cursor: not-allowed;
        }
        
        .error-message {
            background: #fff3f3;
            color: #d32f2f;
            padding: 10px 12px;
            margin-bottom: 20px;
            font-size: 13px;
            border: 1px solid #ffcdd2;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            background: #f1f8f4;
            color: #1b5e20;
            padding: 10px 12px;
            margin-bottom: 20px;
            font-size: 13px;
            border: 1px solid #c8e6c9;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>CMS Inloggen</h1>
            <p>Voer het beheerderswachtwoord in</p>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Wachtwoord:</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Voer wachtwoord in"
                        required
                        autofocus
                    >
                    <button 
                        type="button" 
                        class="toggle-password" 
                        id="togglePassword"
                        title="Toon/verberg wachtwoord"
                    >
                        👁
                    </button>
                </div>
                
                <button 
                    type="submit" 
                    class="login-button"
                    id="loginBtn"
                >
                    Inloggen
                </button>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loginBtn = document.getElementById('loginBtn');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePasswordBtn.textContent = type === 'password' ? '👁' : '👁‍🗨';
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            
            const password = passwordInput.value.trim();
            
            if (!password) {
                errorMessage.textContent = 'Voer een wachtwoord in.';
                errorMessage.classList.add('show');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Bezig met inloggen...';
            
            try {
                const response = await fetch('/api/cms/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    successMessage.textContent = 'Ingelogd! Door naar CMS...';
                    successMessage.classList.add('show');
                    
                    setTimeout(() => {
                        window.location.href = '/cms';
                    }, 1000);
                } else {
                    errorMessage.textContent = data.error || 'Onjuist wachtwoord.';
                    errorMessage.classList.add('show');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                errorMessage.textContent = 'Fout bij inloggen. Probeer later opnieuw.';
                errorMessage.classList.add('show');
                console.error('Login error:', error);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Inloggen';
            }
        });
    </script>
</body>
</html>
