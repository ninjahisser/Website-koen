<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS - Content en shop</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Simpele CMS navbar */
        .cms-navbar {
            background-color: #2d5f4f;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .cms-navbar-inner {
            width: 100%;
            max-width: 1400px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 30px;
            flex-wrap: wrap;
        }

        .cms-logo {
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            margin-right: auto;
            white-space: nowrap;
            display: inline-block;
        }

        .cms-nav-btn {
            display: inline-block;
            padding: 9px 16px;
            background-color: #1a3a2e;
            color: white;
            text-decoration: none;
            border: 2px solid #4a8b78;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            font-family: inherit;
            line-height: 1;
            text-align: center;
        }

        .cms-nav-btn:hover {
            background-color: #4a8b78;
            border-color: #6ab399;
        }

        .cms-logout-btn {
            background-color: #c74a2e;
            border-color: #e67350;
        }

        .cms-logout-btn:hover {
            background-color: #e67350;
            border-color: #f0a08a;
        }

        /* Verberg originele navbar */
        .cms-page .navbar {
            display: none;
        }
    </style>
</head>
<body class="cms-page">
    <div class="cms-navbar">
        <div class="cms-navbar-inner">
            <a href="/" class="cms-logo">Studio Malem CMS</a>
            <a href="/" class="cms-nav-btn">← Terug naar home</a>
            <a href="/shop" class="cms-nav-btn">Naar shop</a>
            <button id="logout-btn" class="cms-nav-btn cms-logout-btn">Uitloggen</button>
        </div>
    </div>
    <div class="content-wrapper">
        <h1 class="cms-title">CMS beheer</h1>
        <div class="cms-tabs">
            <button class="cms-tab-btn active" data-tab="cms-tab-orders">Bestellingen</button>
            <button class="cms-tab-btn" data-tab="cms-tab-products">Shop-producten</button>
            <button class="cms-tab-btn" data-tab="cms-tab-content">Content</button>
            <button class="cms-tab-btn" data-tab="cms-tab-stats">Statistieken</button>
            <button class="cms-tab-btn" data-tab="cms-tab-homepage">Homepage</button>
        </div>
        <div id="cms-tab-orders" class="cms-tab-content">
            <section id="cms-orders" class="cms-section">
                <div class="cms-section-header">
                    <h2>Bestellingen</h2>
                    <button id="refresh-orders-btn" class="cms-button">Vernieuwen</button>
                </div>
                <p class="cms-section-note">Recente bestellingen via Stripe checkout.</p>
                <div id="orders-container">
                    <p>Bestellingen laden...</p>
                </div>
            </section>
        </div>
        <div id="cms-tab-products" class="cms-tab-content" style="display:none;">
            <section id="cms-products" class="cms-section">
                <div class="cms-section-header">
                    <div>
                        <h2>Shopproducten</h2>
                        <p class="cms-section-note">Voeg producten toe die op de shop-pagina verschijnen en via Stripe afgerekend worden.</p>
                    </div>
                    <button id="add-product-btn" class="cms-button">Nieuw product toevoegen</button>
                </div>
                <div id="products-container"></div>
            </section>
        </div>
        <div id="cms-tab-content" class="cms-tab-content" style="display:none;">
            <section id="cms-articles" class="cms-section">
                <div class="cms-section-header">
                    <h2>Artikels</h2>
                    <button id="add-article-btn" class="cms-button">Nieuw artikel toevoegen</button>
                </div>
                <div id="articles-container"></div>
            </section>
        </div>
        <div id="cms-tab-stats" class="cms-tab-content" style="display:none;">
            <section id="cms-stats" class="cms-section">
                <h2>Statistieken</h2>
                <div id="stats-container"></div>
            </section>
        </div>
        <div id="cms-tab-homepage" class="cms-tab-content" style="display:none;">
            <section id="cms-homepage" class="cms-section">
                <h2>Homepage sidebar</h2>
                <!-- HVLN <div class="cms-field-grid"> -->
                    <div class="cms-form-row">
                        <label for="newsletterTitleInput">Nieuwsbrief titel</label>
                        <input id="newsletterTitleInput" type="text" class="cms-input">
                    </div>
                    <div class="cms-form-row">
                        <label for="newsletterTextInput">Nieuwsbrief tekst</label>
                        <input id="newsletterTextInput" type="text" class="cms-input">
                    </div>
                    <div class="cms-form-row">
                        <label for="newsletterButtonTextInput">Nieuwsbrief knop tekst</label>
                        <input id="newsletterButtonTextInput" type="text" class="cms-input">
                    </div>
                    <div class="cms-form-row">
                        <label for="newsletterButtonLinkInput">Nieuwsbrief knop link</label>
                        <input id="newsletterButtonLinkInput" type="text" class="cms-input">
                    </div>
                    <!-- HVLN
                    <div class="cms-form-row">
                        <label for="workshopTitleInput">Workshop titel</label>
                        <input id="workshopTitleInput" type="text" class="cms-input">
                    </div>
                    <div class="cms-form-row">
                        <label for="workshopTextInput">Workshop tekst</label>
                        <input id="workshopTextInput" type="text" class="cms-input">
                    </div>
                    <div class="cms-form-row">
                        <label for="workshopButtonTextInput">Workshop knop tekst</label>
                        <input id="workshopButtonTextInput" type="text" class="cms-input">
                    </div>
                    <div class="cms-form-row">
                        <label for="workshopButtonLinkInput">Workshop knop link</label>
                        <input id="workshopButtonLinkInput" type="text" class="cms-input">
                    </div>
                    -->
                </div>
                <div class="cms-actions">
                    <button id="save-homepage-btn" class="cms-button">Opslaan</button>
                    <span id="homepage-status" class="cms-status"></span>
                </div>
            </section>
        </div>
    </div>
    <script src="/js/config.js"></script>
    <script src="/js/cart.js"></script>
    <script>
        if (!USE_LOCAL_API && !window.location.hostname.includes('pythonanywhere.com')) {
            window.location.replace(PRODUCTION_BACKEND_URL + '/cms');
        }
    </script>
    <script src="/js/cms.js"></script>
</body>
</html>
