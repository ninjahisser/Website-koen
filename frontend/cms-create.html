<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS - Nieuw artikel</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .cms-navbar {
            background-color: #2d5f4f;
            display: flex;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .cms-navbar-inner {
            width: 100%;
            max-width: 1400px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            flex-wrap: wrap;
        }

        .cms-logo {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            margin-right: auto;
        }

        .cms-nav-btn {
            padding: 8px 14px;
            background-color: #1a3a2e;
            color: #fff;
            text-decoration: none;
            border: 1px solid #4a8b78;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .cms-nav-btn:hover {
            background-color: #4a8b78;
            border-color: #6ab399;
        }

        .cms-logout-btn {
            background-color: #c74a2e;
            border-color: #e67350;
        }

        .cms-logout-btn:hover {
            background-color: #e67350;
            border-color: #f0a08a;
        }

        .cms-create-page .navbar {
            display: none;
        }

        .cms-create-page .content-wrapper {
            max-width: 980px;
            background: transparent;
            border: none;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        .cms-create-page .cms-form {
            border: 1px solid #e8ecea;
            border-radius: 8px;
            padding: 20px;
            background: #fff;
        }

        .cms-create-page .cms-form-row {
            border: none;
            padding: 0;
            background: transparent;
            margin-bottom: 18px;
        }

        .cms-create-page .cms-form-row > label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #4e6660;
            font-weight: 700;
        }

        .cms-create-page .cms-input,
        .cms-create-page .cms-textarea,
        .cms-create-page select {
            border: 1px solid #b8c9c2;
            background: #fff;
            border-radius: 4px;
        }

        .cms-create-page .components-editor,
        .cms-create-page .components-list {
            border: 1px solid #e2e8e5;
            border-radius: 8px;
            background: #fcfdfd;
            padding: 12px;
        }

        .cms-create-page .components-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .cms-create-page .components-toolbar .cms-button {
            background: #eaf1ee;
            color: #264a3e;
            border: 1px solid #c9d8d2;
            font-size: 13px;
            font-weight: 700;
            padding: 7px 12px;
        }

        .cms-create-page .components-toolbar .cms-button:hover {
            background: #dce9e3;
            border-color: #b6cbc2;
        }

        .cms-create-page .component-row {
            border: 2px solid #111;
            border-radius: 6px;
            background: #fff;
            padding: 10px;
            margin-bottom: 10px;
            transition: transform 180ms ease;
        }

        .cms-create-page #thumbnail-preview {
            border: 1px solid #e2e8e5;
            border-radius: 6px;
            padding: 8px;
            background: #fcfdfd;
            min-height: 100px;
            display: flex;
            align-items: flex-start;
        }

        .cms-create-page .thumb-preview-media {
            width: 160px;
            height: 96px;
            object-fit: cover;
            border: 1px solid #aebfb8;
            border-radius: 4px;
            display: block;
        }

        .cms-create-page .thumb-preview-caption {
            margin: 6px 0 0;
            font-size: 12px;
            color: #35584b;
            font-weight: 600;
        }

        .cms-create-page .thumb-preview-note {
            margin: 0;
            color: #48665b;
            font-size: 12px;
        }

        .cms-toast {
            position: fixed;
            right: 20px;
            top: 20px;
            z-index: 3000;
            min-width: 220px;
            max-width: 340px;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid #c9d8d2;
            background: #f2f7f5;
            color: #24463b;
            font-size: 13px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity 180ms ease, transform 180ms ease;
            pointer-events: none;
        }

        .cms-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .cms-toast.error {
            border-color: #e3b9b9;
            background: #fff1f1;
            color: #7d2a2a;
        }
    </style>
</head>
<body class="cms-page cms-create-page">
    <div class="cms-navbar">
        <div class="cms-navbar-inner">
            <a href="/" class="cms-logo">Studio Malem CMS</a>
            <a href="/cms" class="cms-nav-btn">← Terug naar CMS</a>
            <a href="/cms-create" class="cms-nav-btn">Nieuw artikel</a>
            <a href="/shop" class="cms-nav-btn">Naar shop</a>
            <button id="logout-btn" class="cms-nav-btn cms-logout-btn">Uitloggen</button>
        </div>
    </div>

    <div class="content-wrapper">
        <h1 class="cms-title">Nieuw artikel</h1>
        <div id="create-status" class="cms-status"></div>
        <form id="create-form" class="cms-form">
            <div class="cms-form-row">
                <label for="title">Titel</label>
                <input id="title" name="title" type="text" class="cms-input" required>
            </div>
            <div class="cms-form-row">
                <label for="category">Categorie</label>
                <input id="category" name="category" type="text" class="cms-input">
            </div>
            <div class="cms-form-row">
                <label for="group">Group</label>
                <select id="group" name="group" class="cms-input"></select>
                <input id="new-group" name="new-group" type="text" class="cms-input cms-input-muted" placeholder="Nieuwe groep naam" style="display: none;">
            </div>
            <div class="cms-form-row">
                <label for="size">Size</label>
                <select id="size" name="size" class="cms-input">
                    <option value="klein">klein</option>
                    <option value="groot">groot</option>
                    <option value="tekst">tekst</option>
                </select>
            </div>
            <div class="cms-form-row">
                <label for="thumbnail-mode">Thumbnail</label>
                <select id="thumbnail-mode" class="cms-input">
                    <option value="auto-first" selected>Automatisch: eerste element (foto of video)</option>
                    <option value="auto-image">Automatisch: eerste afbeelding</option>
                    <option value="auto-video">Automatisch: eerste video</option>
                    <option value="custom-url">Aangepaste URL</option>
                    <option value="upload">Aparte thumbnail uploaden</option>
                </select>
            </div>
            <div class="cms-form-row" id="thumbnail-kind-row" style="display:none;">
                <label for="thumbnail-kind">Thumbnail type</label>
                <select id="thumbnail-kind" class="cms-input">
                    <option value="image">Afbeelding</option>
                    <option value="video">Video</option>
                </select>
            </div>
            <div class="cms-form-row" id="thumbnail-url-row" style="display:none;">
                <label for="thumbnail-url">Thumbnail URL</label>
                <input id="thumbnail-url" type="text" class="cms-input" placeholder="https://...">
            </div>
            <div class="cms-form-row" id="thumbnail-upload-row" style="display:none;">
                <label for="thumbnail-upload">Thumbnail bestand uploaden</label>
                <input id="thumbnail-upload" type="file" class="cms-input" accept="image/*,video/*">
                <div id="thumbnail-upload-status" style="margin-top: 8px; font-size: 12px; color: #666;"></div>
            </div>
            <div class="cms-form-row">
                <label>Thumbnail preview</label>
                <div id="thumbnail-preview" style="width: 100%;"></div>
            </div>
            <div class="cms-form-row">
                <label>Components</label>
                <div class="components-editor">
                    <div class="components-toolbar">
                        <button type="button" class="cms-button cms-button-secondary" data-add="text">Tekst</button>
                        <button type="button" class="cms-button cms-button-secondary" data-add="image">Afbeelding</button>
                        <button type="button" class="cms-button cms-button-secondary" data-add="video">Video</button>
                        <button type="button" class="cms-button cms-button-secondary" data-add="audio">Audio</button>
                    </div>
                    <div id="components-list" class="components-list"></div>
                </div>
            </div>
            <div class="cms-actions">
                <button type="submit" class="cms-button">Aanmaken</button>
                <a href="/cms" class="cms-button cms-button-secondary">Annuleren</a>
            </div>
        </form>
    </div>

    <script src="/js/config.js"></script>
    <script>
        if (!USE_LOCAL_API && !window.location.hostname.includes('pythonanywhere.com')) {
            window.location.replace(PRODUCTION_BACKEND_URL + '/cms-create');
        }
    </script>
    <script src="/js/cms-create.js"></script>
</body>
</html>
